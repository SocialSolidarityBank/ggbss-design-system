<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="GGBSS Design System — 귀여운 은행을 브랜드 팔레트로 색칠하는 돼지 캐릭터">
  <defs>
    <linearGradient id="wash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E7F3FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" fill="url(#wash)"/>

  <!-- ground -->
  <ellipse cx="330" cy="316" rx="250" ry="14" fill="#D7E6F3"/>

  <!-- bank -->
  <rect x="118" y="298" width="424" height="16" rx="4" fill="#DCE7F1"/>
  <rect x="142" y="284" width="376" height="16" rx="4" fill="#EDF3F9"/>
  <rect x="170" y="150" width="320" height="134" fill="#FFFFFF" stroke="#D6E1EC" stroke-width="1.5"/>

  <!-- columns -->
  <g fill="#FFFFFF" stroke="#D9E3ED" stroke-width="1.5">
    <rect x="182" y="178" width="28" height="104" rx="8"/>
    <rect x="252" y="178" width="28" height="104" rx="8"/>
    <rect x="380" y="178" width="28" height="104" rx="8"/>
    <rect x="450" y="178" width="28" height="104" rx="8"/>
  </g>
  <g fill="#EEF4F9">
    <rect x="178" y="172" width="36" height="9" rx="3"/>
    <rect x="248" y="172" width="36" height="9" rx="3"/>
    <rect x="376" y="172" width="36" height="9" rx="3"/>
    <rect x="446" y="172" width="36" height="9" rx="3"/>
  </g>

  <!-- arched door -->
  <path d="M300 284 L300 244 Q300 216 330 216 Q360 216 360 244 L360 284 Z" fill="#CDEAFF" stroke="#9CC7E8" stroke-width="1.5"/>
  <circle cx="352" cy="252" r="3" fill="#006CB7"/>

  <!-- entablature (being painted) -->
  <rect x="160" y="150" width="340" height="26" rx="4" fill="#006CB7"/>
  <!-- fresh sky paint patch -->
  <rect x="404" y="150" width="96" height="26" rx="4" fill="#58C5FF"/>
  <rect x="404" y="150" width="10" height="26" fill="#7FD3FF"/>

  <!-- pediment -->
  <path d="M150 150 L510 150 L330 90 Z" fill="#26257C"/>
  <circle cx="330" cy="126" r="19" fill="#FFFFFF"/>
  <text x="330" y="134" text-anchor="middle" font-family="system-ui, sans-serif" font-size="22" font-weight="700" fill="#006CB7">₩</text>

  <!-- paint bucket -->
  <path d="M566 290 l44 0 -6 30 -32 0 Z" fill="#ECF0F3" stroke="#C7D2DD" stroke-width="1.5"/>
  <ellipse cx="588" cy="290" rx="22" ry="6" fill="#006CB7"/>
  <path d="M568 290 q20 -16 40 0" fill="none" stroke="#9AA6B2" stroke-width="2"/>

  <!-- pig -->
  <path d="M566 250 q16 -2 13 -16 q-2 -11 -13 -6" fill="none" stroke="#F0A0B6" stroke-width="6" stroke-linecap="round"/>
  <ellipse cx="520" cy="264" rx="48" ry="44" fill="#F4A9BD"/>
  <ellipse cx="520" cy="276" rx="31" ry="26" fill="#FBD3DE"/>
  <rect x="500" y="298" width="15" height="20" rx="7" fill="#F4A9BD"/>
  <rect x="524" y="298" width="15" height="20" rx="7" fill="#F4A9BD"/>
  <!-- front arm to roller -->
  <path d="M486 244 Q470 226 458 206" fill="none" stroke="#F4A9BD" stroke-width="13" stroke-linecap="round"/>
  <!-- roller -->
  <line x1="458" y1="206" x2="438" y2="176" stroke="#8A94A0" stroke-width="5" stroke-linecap="round"/>
  <rect x="416" y="150" width="40" height="16" rx="6" fill="#58C5FF" stroke="#2FA8E8" stroke-width="1.5"/>
  <!-- head -->
  <path d="M500 190 q-8 -24 14 -19 q-1 13 -8 22 Z" fill="#EC8FA6"/>
  <path d="M540 190 q8 -24 -14 -19 q1 13 8 22 Z" fill="#EC8FA6"/>
  <circle cx="520" cy="214" r="37" fill="#F4A9BD"/>
  <circle cx="500" cy="222" r="5.5" fill="#F7C2D0"/>
  <circle cx="540" cy="222" r="5.5" fill="#F7C2D0"/>
  <ellipse cx="520" cy="224" rx="18" ry="13" fill="#EC8FA6"/>
  <ellipse cx="513" cy="224" rx="2.6" ry="3.6" fill="#B5536C"/>
  <ellipse cx="527" cy="224" rx="2.6" ry="3.6" fill="#B5536C"/>
  <circle cx="507" cy="206" r="3.8" fill="#2A2233"/>
  <circle cx="533" cy="206" r="3.8" fill="#2A2233"/>
  <circle cx="508.4" cy="204.6" r="1.2" fill="#FFFFFF"/>
  <circle cx="534.4" cy="204.6" r="1.2" fill="#FFFFFF"/>
  <path d="M511 236 q9 7 18 0" fill="none" stroke="#B5536C" stroke-width="2" stroke-linecap="round"/>

  <!-- paint blobs (palette) -->
  <circle cx="120" cy="250" r="9" fill="#00A775"/>
  <circle cx="96" cy="286" r="7" fill="#FAA41A"/>
  <circle cx="560" cy="150" r="8" fill="#F16A26"/>

  <!-- title -->
  <text x="648" y="172" font-family="'Pretendard', system-ui, sans-serif" font-size="68" font-weight="800" letter-spacing="-1.5" fill="#0A1E33">GGBSS</text>
  <text x="650" y="226" font-family="'Pretendard', system-ui, sans-serif" font-size="40" font-weight="700" fill="#006CB7">Design System</text>
  <text x="652" y="262" font-family="'Pretendard', system-ui, sans-serif" font-size="19" font-weight="500" fill="#5A6470">ggbss.or.kr 라이브 디자인 시스템 · SSOT</text>
  <g>
    <circle cx="660" cy="296" r="10" fill="#006CB7"/>
    <circle cx="690" cy="296" r="10" fill="#58C5FF"/>
    <circle cx="720" cy="296" r="10" fill="#26257C"/>
    <circle cx="750" cy="296" r="10" fill="#00A775"/>
    <circle cx="780" cy="296" r="10" fill="#FAA41A"/>
    <circle cx="810" cy="296" r="10" fill="#F16A26"/>
    <circle cx="840" cy="296" r="10" fill="#0A1E33"/>
  </g>
</svg>
