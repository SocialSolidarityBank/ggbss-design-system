<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">GGBSS Design System banner</title>
  <desc id="desc">A cute pig character lovingly paints a friendly bank building with GGBSS brand colors, alongside the GGBSS Design System title and palette dots.</desc>

  <defs>
